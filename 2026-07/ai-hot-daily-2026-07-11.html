% 成本降低", "summary": "GitHub 在 Copilot 代码审查中尝试用 Copilot CLI 的共享代码探索工具（grep、glob、view）替换原有专用工具，结果导致审查成本上升、有效评论数量下降。分析 trace 发现，问题不在工具本身，而在于指令让智能体像通用编程助手一样大范围浏览仓库，而非像审查者一样从 diff 出发进行定向搜索。重写指令后，审查平均成本降低约 20%，同时保持相同审查质量。", "sourceUrl": "https://github.blog/ai-and-ml/github-copilot/better-tools-made-copilot-code-review-worse-heres-how-we-actually-improved-it", "sourceName": "GitHub Blog", "permalink": "https://aihot.virxact.com/items/cmrf54vpm006yihg8qjqnynnd", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrf54vpm006yihg8qjqnynnd"}}, {"title": "Theory Ventures 三周年：AI 如何重塑软件栈与风投定义", "summary": "Theory Ventures 合伙人 Tomer Tunguz 发文总结 AI 带来的市场巨变。新模型每 41 天发布一次，公司达 1 亿美元收入速度创纪录。AI 压缩时间导致风投阶段定义失效，种子轮规模从 100 万到 5 亿美元不等。推理正取代模型成为 AI 主导市场，基础设施按视频、批处理、本地、智能体等负载类型专业化细分。推理的高成本催生了 AI 广告补贴模式，Koah 的 AI 对话原生广告点击率是展示广告基线的 4-5 倍。闭源与开源、云端与本地模型差距缩小，许多模型已“足够好”。安全攻击面因 MCP 服务器、技能、插件和编码智能体而急剧扩大。", "sourceUrl": "https://www.tomtunguz.com/three-years-in", "sourceName": "Tomer Tunguz 博客（VC 分析）", "permalink": "https://aihot.virxact.com/items/cmrf82258008rihprk7jd53by", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrf82258008rihprk7jd53by"}}]}], "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/daily/2026-07-11"}, "generatedAt": "2026-07-11T00:00:00.779Z", "windowStart": "2026-07-10T00:00:00.000Z", "windowEnd": "2026-07-11T00:00:00.000Z"}</script><script>
class ThemeManager{
  constructor(){this.current=this.stored()||this.system();this.apply(this.current);this.init();}
  system(){return matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";}
  stored(){return localStorage.getItem("theme");}
  apply(t){if(t==="system"){document.documentElement.removeAttribute("data-theme");localStorage.removeItem("theme");}else{document.documentElement.setAttribute("data-theme",t);localStorage.setItem("theme",t);}this.current=t;this.ui();}
  init(){var t=document.querySelector(".theme-toggle");if(t)t.addEventListener("click",function(e){var b=e.target.closest("button[data-theme]");if(b)this.apply(b.dataset.theme);}.bind(this));}
  ui(){document.querySelectorAll(".theme-toggle button").forEach(function(b){var on=b.dataset.theme===this.current;b.classList.toggle("active",on);b.setAttribute("aria-checked",on);}.bind(this));}
}
(function(){
  function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
  function bj(d,o){return new Intl.DateTimeFormat("zh-CN",Object.assign({timeZone:"Asia/Shanghai"},o)).format(d);}
  function pUTC(s){try{return s?new Date(s):null;}catch(e){return null;}}
  var P=JSON.parse(document.getElementById("payload").textContent);
  document.getElementById("title").textContent="AI 日报 · "+P.date;
  var g=pUTC(P.generatedAt),ws=pUTC(P.windowStart),we=pUTC(P.windowEnd),sub=[];
  if(g)sub.push("生成于 "+bj(g,{month:"long",day:"numeric",hour:"2-digit",minute:"2-digit",hour12:false})+"（北京时间）");
  if(ws&&we)sub.push("数据窗口："+bj(ws,{month:"long",day:"numeric"})+" – "+bj(we,{month:"long",day:"numeric"}));
  document.getElementById("subtitle").textContent=sub.join(" · ");
  document.getElementById("totalnum").textContent=P.total;
  var stats=document.getElementById("stats");
  P.sections.forEach(function(s,i){var d=document.createElement("div");d.className="stat c"+i;d.innerHTML='<div class="n">'+s.items.length+'</div><div class="l">'+esc(s.label)+'</div>';stats.appendChild(d);});
  var toc=document.getElementById("toc");
  P.sections.forEach(function(s,i){var a=document.createElement("a");a.href="#sec"+i;a.textContent=s.label;toc.appendChild(a);});
  var main=document.getElementById("main"),n=0;
  P.sections.forEach(function(s,i){
    var sec=document.createElement("section");sec.className="block";sec.id="sec"+i;
    var h=document.createElement("h2");h.innerHTML=esc(s.label)+' <span class="pill">'+s.items.length+'</span>';sec.appendChild(h);
    var grid=document.createElement("div");grid.className="grid";
    s.items.forEach(function(it){n++;var url=it.sourceUrl||it.permalink||"#";
      var art=document.createElement("article");art.className="card";
      art.innerHTML='<span class="num">'+n+'</span><h3>'+esc(it.title)+'</h3>'+(it.sourceName?'<span class="chip">'+esc(it.sourceName)+'</span>':'')+'<p>'+esc(it.summary||"")+'</p><a class="more" href="'+esc(url)+'" target="_blank" rel="noopener noreferrer">阅读原文 →</a>';
      grid.appendChild(art);});
    sec.appendChild(grid);main.appendChild(sec);
  });
  document.getElementById("footertotal").textContent=P.total;
  new ThemeManager();
  var anchors=[].slice.call(toc.querySelectorAll("a"));
  if("IntersectionObserver" in window){
    var obs=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting)anchors.forEach(function(a){a.classList.toggle("active",a.getAttribute("href")==="#"+e.target.id);});});},{rootMargin:"-30% 0px -60% 0px"});
    P.sections.forEach(function(s,i){var el=document.getElementById("sec"+i);if(el)obs.observe(el);});
  }
})();</script></body></html>
