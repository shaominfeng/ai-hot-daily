将公开追踪并报告针对这些问题的具体行动及成效。", "sourceUrl": "https://www.anthropic.com/news/hard-questions", "sourceName": "Anthropic：Newsroom（网页）", "permalink": "https://aihot.virxact.com/items/cmrdslwmv06tcih4bzp5l7ivy", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrdslwmv06tcih4bzp5l7ivy"}}, {"title": "Anthropic长期利益信托任命本·伯南克为受托人", "summary": "Anthropic的长期利益信托（LTBT）任命前美联储主席、2022年诺贝尔经济学奖得主本·伯南克为最新受托人。他将与另外三位受托人共同监督公司以对社会长期有益的方式负责任开发先进AI的使命。LTBT独立于管理团队和投资者，受托人不持股、不分红，仅按服务时间获酬。该信托有权向Anthropic董事会任命成员，并就AI风险与社会影响等关键决策提供建议。伯南克将参与公司的经济研究，帮助理解AI对全球劳动力与经济的影响。", "sourceUrl": "https://www.anthropic.com/news/ben-bernanke", "sourceName": "Anthropic：Newsroom（网页）", "permalink": "https://aihot.virxact.com/items/cmrdqgmkj067pih4b2dbg61ml", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrdqgmkj067pih4b2dbg61ml"}}, {"title": "GPT-5.5 生物漏洞赏金计划", "summary": "OpenAI 将 GPT-5.5 Bio Bug Bounty 升级为持续私密项目 OpenAI Bio Bounty Program，以 GPT-5.6 为起点并覆盖后续前沿模型，旨在发现能突破预设生物安全挑战的通用越狱攻击。奖励从 $25,000 提高至 $50,000，适用于", "sourceUrl": "https://openai.com/index/bio-bug-bounty", "sourceName": "OpenAI：官网动态（RSS · 排除企业/客户案例）", "permalink": "https://aihot.virxact.com/items/cmrdsqmsk06u9ih4b7mf2hgxo", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrdsqmsk06u9ih4b7mf2hgxo"}}]}, {"label": "论文研究", "items": [{"title": "揭密在线策略蒸馏：何时有益、何时有害及原因", "summary": "Apple机器学习研究团队提出训练无关诊断框架，以每个token、每个问题、每个教师的分辨率分析on-policy蒸馏。通过可扩展targeted-rollout算法估计理想梯度，并计算蒸馏梯度与理想梯度的余弦相似度（梯度对齐分数）。实验发现，蒸馏指导在错误rollouts上的对齐程度显著高于正确rollouts；最优蒸馏上下文取决于学生模型容量和目标任务，无通用配置。这些发现推动每任务、每token的诊断分析。", "sourceUrl": "https://machinelearning.apple.com/research/unmasking-on-policy-distillation", "sourceName": "Apple Machine Learning Research（RSS）", "permalink": "https://aihot.virxact.com/items/cmre05t8p000fihwk60qqr36x", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmre05t8p000fihwk60qqr36x"}}, {"title": "TGPO：通过可验证奖励强化学习激励第一人称视频时序感知", "summary": "多模态大语言模型（MLLM）在第一人称视频理解中缺乏时序感知，常依赖空间捷径。为此，研究者提出 Temporal Global Policy Optimization（TGPO），一种基于可验证奖励的强化学习算法。TGPO 通过对比模型在时序有序与打乱帧上的输出，生成全局归一化奖励信号，明确奖励时序连贯推理。TGPO 可集成 GRPO 和 GSPO，支持冷启动 RL 训练，抑制 MLLM 的空间捷径行为。在五个第一人称视频基准上，TGPO 一致提升时序定位与因果连贯性，优于此前基于 RL 的视频推理方法。", "sourceUrl": "https://machinelearning.apple.com/research/incentivizing-temporal-awareness-egocentric", "sourceName": "Apple Machine Learning Research（RSS）", "permalink": "https://aihot.virxact.com/items/cmrdpfzhr05x8ih4berz6jnks", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrdpfzhr05x8ih4berz6jnks"}}, {"title": "Apple 提出 SRLM：自反思程序搜索提升长上下文处理能力", "summary": "Apple 机器学习研究团队提出 SRLM 框架，利用自一致性、推理链长度和口头置信度三种内在信号，让模型在推理时评估候选长上下文交互程序。实验表明，在相同时间预算下，SRLM 较传统递归语言模型（RLM）最高提升 22%。分析发现，递归本身并非 RLM 性能关键，简单的自反思程序搜索无需显式递归即可匹配或超越 RLM；在模型上下文窗口内，RLM 反而降低性能，而 SRLM 在短上下文和长上下文中均实现稳定增益。", "sourceUrl": "https://machinelearning.apple.com/research/self-reflective-program-search", "sourceName": "Apple Machine Learning Research（RSS）", "permalink": "https://aihot.virxact.com/items/cmre05t8p000eihwkokpjwaol", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmre05t8p000eihwkokpjwaol"}}]}, {"label": "技巧与观点", "items": [{"title": "AI 能否回答 3 万亿美元的问题？", "summary": "Sequoia 合伙人 David Cahn 更新 AI 基础设施支出估算：2026 年全球投入达 1.5 万亿美元，行业需产生 3 万亿美元收入才能回本。Anthropic 年化收入（ARR）达 600 亿美元，OpenAI 2025 年收入 130 亿美元（11 月称 ARR 200 亿美元），但缺口仍大。Apollo 首席经济学家指出，谷歌、Meta、微软、亚马逊均预测 2028 年自由现金流加速，但风险在于更多组织转向更便宜的开放权重模型（尤其中国模型），且 OpenAI 最新模型编码任务 token 效率提升 54%，导致 token 价格持续下降。若超大规模厂商现金流目标落空，可能引发经济衰退和标普 500 回调。", "sourceUrl": "https://techcrunch.com/2026/07/09/can-ai-answer-the-3-trillion-question", "sourceName": "TechCrunch：AI（RSS）", "permalink": "https://aihot.virxact.com/items/cmre1vdj600h9ihwkt35yib2l", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmre1vdj600h9ihwkt35yib2l"}}, {"title": "社交媒体AI生成内容泛滥：LinkedIn超过40%长文为AI写作", "summary": "安全公司Pangram通过Chrome扩展收集超 class ThemeManager{
  constructor(){this.current=this.stored()||this.system();this.apply(this.current);this.init();}
  system(){return matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";}
  stored(){return localStorage.getItem("theme");}
  apply(t){if(t==="system"){document.documentElement.removeAttribute("data-theme");localStorage.removeItem("theme");}else{document.documentElement.setAttribute("data-theme",t);localStorage.setItem("theme",t);}this.current=t;this.ui();}
  init(){var t=document.querySelector(".theme-toggle");if(t)t.addEventListener("click",function(e){var b=e.target.closest("button[data-theme]");if(b)this.apply(b.dataset.theme);}.bind(this));}
  ui(){document.querySelectorAll(".theme-toggle button").forEach(function(b){var on=b.dataset.theme===this.current;b.classList.toggle("active",on);b.setAttribute("aria-checked",on);}.bind(this));}
}

  var g=pUTC(P.generatedAt),ws=pUTC(P.windowStart),we=pUTC(P.windowEnd),sub=[];
  if(g)sub.push("生成于 "+bj(g,{month:"long",day:"numeric",hour:"2-digit",minute:"2-digit",hour12:false})+"（北京时间）");
  if(ws&&we)sub.push("数据窗口："+bj(ws,{month:"long",day:"numeric"})+" – "+bj(we,{month:"long",day:"numeric"}));
  document.getElementById("subtitle").textContent=sub.join(" · ");
  document.getElementById("totalnum").textContent=P.total;
  var stats=document.getElementById("stats");
  P.sections.forEach(function(s,i){var d=document.createElement("div");d.className="stat c"+i;d.innerHTML='<div class="n">'+s.items.length+'</div><div class="l">'+esc(s.label)+'</div>';stats.appendChild(d);});
  var toc=document.getElementById("toc");
  P.sections.forEach(function(s,i){var a=document.createElement("a");a.href="#sec"+i;a.textContent=s.label;toc.appendChild(a);});
  var main=document.getElementById("main"),n=0;
  P.sections.forEach(function(s,i){
    var sec=document.createElement("section");sec.className="block";sec.id="sec"+i;
    var h=document.createElement("h2");h.innerHTML=esc(s.label)+' <span class="pill">'+s.items.length+'</span>';sec.appendChild(h);
    var grid=document.createElement("div");grid.className="grid";
    s.items.forEach(function(it){n++;var url=it.sourceUrl||it.permalink||"#";
      var art=document.createElement("article");art.className="card";
      art.innerHTML='<span class="num">'+n+'</span><h3>'+esc(it.title)+'</h3>'+(it.sourceName?'<span class="chip">'+esc(it.sourceName)+'</span>':'')+'<p>'+esc(it.summary||"")+'</p><a class="more" href="'+esc(url)+'" target="_blank" rel="noopener noreferrer">阅读原文 →</a>';
      grid.appendChild(art);});
    sec.appendChild(grid);main.appendChild(sec);
  });
  document.getElementById("footertotal").textContent=P.total;
  new ThemeManager();
  var anchors=[].slice.call(toc.querySelectorAll("a"));
  if("IntersectionObserver" in window){
    var obs=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting)anchors.forEach(function(a){a.classList.toggle("active",a.getAttribute("href")==="#"+e.target.id);});});},{rootMargin:"-30% 0px -60% 0px"});
    P.sections.forEach(function(s,i){var el=document.getElementById("sec"+i);if(el)obs.observe(el);});
  }
})();</script></body></html>
