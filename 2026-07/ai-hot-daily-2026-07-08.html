1b6ihogth8k26f6", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrav068k01b6ihogth8k26f6"}}, {"title": "Gemini API Managed Agents 新增后台执行、远程 MCP 与自定义函数等能力", "summary": "Google 为 Gemini API 的 Managed Agents 新增后台执行、远程 MCP 服务器集成、自定义函数调用与凭证刷新功能。后台执行通过传入 `background: true` 异步运行任务，立即返回 ID 供轮询状态或流式获取进度。Managed Agents 可直接连接远程 MCP 服务器，无需自定义代理中间件，并能与内置沙箱工具（如 Google 搜索、代码执行）混合使用。自定义函数调用支持本地执行业务逻辑，内置工具自动在服务端运行。凭证刷新通过传递现有环境 ID 和新网络配置完成，沙箱内文件系统、已安装包和仓库保持不变。这些更新旨在帮助开发者构建可靠的生产级 AI 智能体。", "sourceUrl": "https://blog.google/innovation-and-ai/technology/developers-tools/expanding-managed-agents-gemini-api", "sourceName": "Google Blog：AI（RSS）", "permalink": "https://aihot.virxact.com/items/cmraw22r701jjihogh1k8hbu6", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmraw22r701jjihogh1k8hbu6"}}, {"title": "NotebookLM短视频概览正式上线", "summary": "短视频概览功能已正式在移动端和网页端面向所有英语用户全面上线！ 一如既往，您的意见对我们至关重要。请在下方分享您最喜欢的作品，并告诉我们接下来需要添加哪些功能！❤️", "sourceUrl": "https://x.com/NotebookLM/status/2074551227594264799", "sourceName": "X：NotebookLM (@NotebookLM)", "permalink": "https://aihot.virxact.com/items/cmray36fg021nihogfo205417", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmray36fg021nihogfo205417"}}, {"title": "Hugging Face Storage 成为 SkyPilot 一级后端：零出站费跨云存储", "summary": "Hugging Face Storage 现为 SkyPilot 的一级后端。用户通过 `hf://` URL 和现有 HFTOKEN 即可将 Hugging Face Bucket（读写）或模型/数据集/Space 仓库（只读）挂载到 SkyPilot 任务中，支持 MOUNT（FUSE 懒加载）或 COPY 模式。SkyPilot 可将任务调度到 20+ 云、Kubernetes、Slurm 及本地集群的任意可用 GPU 上。Hugging Face 不收取出站及 CDN 费用，故跨云读取数据无额外成本。存储价格 $12–18/TB/月，低于 AWS S3 加出站费。Bucket 基于 Xet，增量检查点和模型变体仅存储和传输改…", "sourceUrl": "https://huggingface.co/blog/skypilot-hf-storage", "sourceName": "Hugging Face：Blog（RSS）", "permalink": "https://aihot.virxact.com/items/cmrb18k7802uuihogxse92jx2", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrb18k7802uuihogxse92jx2"}}, {"title": "Claude Code v2.1.203 c-models-to-cut-costs", "sourceName": "The Decoder：AI News（RSS）", "permalink": "https://aihot.virxact.com/items/cmrb0u6pv02qtihogovduu795", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrb0u6pv02qtihogovduu795"}}, {"title": "美国首批自主地面车辆在乌克兰参战", "summary": "美国自动驾驶车辆公司 Forterra 宣布，过去九个月已向乌克兰战场部署超过 100 辆基于 Polaris ATV 的 Lancer 自主地面车辆。这些汽油动力车辆可携带 750 公斤货物，加装 Starlink 天线实现远程操控，已执行 1100 多次任务，行驶 2500 英里，运送 777,440 磅物资，完成 52 次伤员撤离。目前车辆主要采用远程操作，因自主系统尚无法实时识别并应对敌方威胁。Forterra 已融资超 5 亿美元，正将经典机器人方法与生成式 AI 结合以提升自主能力。美军专家认为地面自主技术已具实战价值。", "sourceUrl": "https://techcrunch.com/2026/07/07/the-first-american-autonomous-ground-vehicles-are-fighting-in-ukraine", "sourceName": "TechCrunch：AI（RSS）", "permalink": "https://aihot.virxact.com/items/cmrafv8m40090ihuamebn107w", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrafv8m40090ihuamebn107w"}}]}, {"label": "论文研究", "items": [{"title": "苹果研究：单个神经元即可绕过大型语言模型的安全对齐", "summary": "苹果研究人员发现，安全对齐由两类神经元调控：拒绝神经元控制有害知识是否表达，概念神经元编码有害知识本身。在七个模型（1.7B至70B参数）中，仅需抑制单个拒绝神经元即可绕过安全对齐，回答有害请求；或放大单个概念神经元，从无害提示诱导出有害内容。整个过程无需训练或提示工程。结果表明安全对齐由个别神经元因果控制。", "sourceUrl": "https://machinelearning.apple.com/research/single-neuron-safety-alignment", "sourceName": "Apple Machine Learning Research（RSS）", "permalink": "https://aihot.virxact.com/items/cmrasd6r300i2ihog8ifwrqs5", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrasd6r300i2ihog8ifwrqs5"}}, {"title": "Weblica：面向视觉网页智能体的可扩展可复现训练环境", "summary": "苹果研究团队提出Weblica框架，通过HTTP级缓存保存网页稳定视觉状态并保留交互行为，结合大语言模型基于真实网站与核心导航技能合成环境，构建可复现、可扩展的训练环境。该框架将强化学习训练扩展到数千个多样化的环境和任务。最佳模型Weblica-8B在多个网页导航基准上超越同等规模的开源模型，推理步骤更少，测试时计算扩展性良好，性能与API模型相当。", "sourceUrl": "https://machinelearning.apple.com/research/weblica-visual-web-agents", "sourceName": "Apple Machine Learning Research（RSS）", "permalink": "https://aihot.virxact.com/items/cmrasd6r300i0ihog8xxwezye", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrasd6r300i0ihog8xxwezye"}}, {"title": "DynaMiCS：带性能约束的大语言模型动态混合微调", "summary": "DynaMiCS是一种动态混合优化器，将多领域微调建模为带性能约束的优化问题。它通过短领域特定探测运行估计跨领域效应斜率矩阵，再基于概率单纯形优化计算混合权重，在提升目标领域性能的同时将约束领域损失维持在参考水平以下。实验表明，DynaMiCS相比固定混合基线取得更强的目标领域提升和约束满足，且计算成本更低，无需参考模型、逐样本评分或手动调节混合权重。", "sourceUrl": "https://machinelearning.apple.com/research/dynamics-fine-tuning-llms", "sourceName": "Apple Machine Learning Research（RSS）", "permalink": "https://aihot.virxact.com/items/cmrasd6r300hxihog9hxmteoz", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrasd6r300hxihog9hxmteoz"}}]}, {"label": "技巧与观点", "items": [{"title": "Elvis Saravia 通过 HITL 和 DialAgent 提升 agentic loops 可靠性", "summary": "Elvis Saravia 介绍使用 human-in-the-loop（HITL）来提升 agentic loops 的可靠性。他所有 Claude 和 Codex agent 会话都通过 @DialAgent MCP 服务器，该服务器为 agent 提供专属号码，支持语音、SMS、iMessage 作为原生工具。当循环/自动化处理 PR 或新功能时，agent 会通过简短电话将决策升级给人类，尤其适合在路上或离开电脑时。用户可粘贴指令让 agent 拨打电话测试。DialAgent 提供 $5 免费额度：http://getdial.ai", "sourceUrl": "https://x.com/omarsar0/status/2074506169352180108", "sourceName": "X：Elvis Saravia (@omarsar0, DAIR.AI)", "permalink": "https://aihot.virxact.com/items/cmrasc88300h6ihog8mwnmob9", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrasc88300h6ihog8mwnmob9"}}, {"title": "FDE爆发：AI公司12个月承诺97.5亿美元部署工程", "summary": "AI公司在12个月内合计承诺97.5亿美元用于建设前部署工程（FDE）团队。三种结构模型浮现：资产负债模型（微软、亚马逊从现有编制调配，Salesforce承诺1000个FDE岗位）；独立实体模型（OpenAI Deployment Company融资40亿美元，投后估值140亿；Anthropic从黑石等融资15亿美元）；合作伙伴生态系统模型（Google Cloud承诺7.5亿美元合作伙伴基金）。瓶颈从模型能力转向部署——GPT-4、Claude、Gemini已足够强大，但多数企业无法自行安装配置。FDE投资构成护城河：嵌入式工程师教育客户、获取专有工作流与数据反馈模型调优，切换成本为制度性而非技术性。", "sourceUrl": "https://www.tomtunguz.com/the-10b-fde-boom", "sourceName": "Tomer Tunguz 博客（VC 分析）", "permalink": "https://aihot.virxact.com/items/cmraxmzfq01y0ihog3h7t344t", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmraxmzfq01y0ihog3h7t344t"}}, {"title": "YC CEO声称每日用AI部署3.7万行代码，开发者审查发现前端代码大量臃肿低效", "summary": "Y Combinator CEO Garry Tan在X上宣称，他与AI编码代理每天在五个项目中部署37000行代码，并保持连续72天发布记录。波兰开发者Gregorein深入审查Tan网站前端代码，发现大量臃肿与低效问题：页面加载169次请求、总计6.42MB数据（对比Hacker News仅7次12KB）；包含28个测试文件、78个未使用的JavaScript控制器、八种格式Logo（含空文件）、未压缩的旧PNG等。Gregorein指出，AI虽能快速生成代码，但质量仍应优先于数量。", "sourceUrl": "https://www.fastcompany.com/91520702/y-combinator-garry-tan-agentic-ai-social-media", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "permalink": "https://aihot.virxact.com/items/cmrayv5ja0293ihog3rixaqua", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrayv5ja0293ihog3rixaqua"}}, {"title": "Liquid AI 开源 Antidoom：基于最终 Token 偏好优化的推理模型死循环修复方法", "summary": "Liquid AI 开源了 Antidoom，一种基于 Final Token Preference Optimization (FTPO) 的针对性修复方法，用于减少推理模型中的 doom loop（死循环）问题。该方法定位循环开始的第一个 token，训练模型选择连贯替代项，而不改变整体输出分布。在 LFM2.5-2.6B 上，硬数学和编程任务中的循环率从 10.2% 降至 1.4%；Qwen3.5-4B 上从 22.9% 降至 1%。整套流程可在数小时内完成，全部代码和数据集（LiquidAI/antidoom-mix-v1.0）已开源。", "sourceUrl": "https://www.marktechpost.com/2026/07/07/liquid-ai-antidoom-doom-loops-ftpo", "sourceName": "MarkTechPost（RSS）", "permalink": "https://aihot.virxact.com/items/cmraw21y401jhihog3tcrfsp4", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmraw21y401jhihog3tcrfsp4"}}, {"title": "在网络不稳定的地区，小型AI模型正逐渐普及", "summary": "2019年，Adebayo Alonge因服务器远在美国致RxScanner单次扫描超5分钟，工程师2小时内将AI模型缩小至可在Android手机本地运行，此后RxScanner能在无宽带、缺电地区验药。小AI模型参数通常至多几十亿，可在手机或Raspberry Pi上运行，功耗仅数瓦。类似案例包括印度腰果病害检测无人机、乌拉圭蚂蚁入侵识别、疟蚊检测及巴西基于Arduino的心电图设备。世界银行报告显示，全球最穷国家仅0.7%互联网用户用过ChatGPT，发达国家达四分之一；行长认为小AI是为缺乏算力与电力的地区提供生命救助服务的关键。", "sourceUrl": "https://spectrum.ieee.org/small-language-models-ai-pharmaceuticals", "sourceName": "Hacker News 热门（buzzing.cc 中文翻译）", "permalink": "https://aihot.virxact.com/items/cmrab8cy800w3ihl38ohuxzih", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrab8cy800w3ihl38ohuxzih"}}, {"title": "Krea 2 身份保留功能上线", "summary": "Krea 2 的身份保留功能已发布，配套模型和 ComfyUI 节点也已上线。🔥", "sourceUrl": "https://x.com/krea_ai/status/2074589965653303321", "sourceName": "X：Krea AI (@krea_ai)", "permalink": "https://aihot.virxact.com/items/cmrb4j2zx00n4ihl14u6xv7kz", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrb4j2zx00n4ihl14u6xv7kz"}}, {"title": "人们如何使用Claude Cowork", "summary": "基于2026年5月11-31日120万次匿名会话样本，Claude Cowork最大用途为业务流程与运营（33.4%），如整理报告、核对表格；其次为内容创作与文案（16.4%），如起草稿件、制作幻灯片；软件开发仅占8.7%。用户多用它处理跨团队衔接性任务，例如律师处理文档格式、招聘经理汇总面试反馈。Claude Cowork面向所有Claude用户开放。", "sourceUrl": "https://claude.com/blog/how-people-are-using-claude-cowork", "sourceName": "Claude：Blog（网页）", "permalink": "https://aihot.virxact.com/items/cmrav068k01b7ihogl498wk0x", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmrav068k01b7ihogl498wk0x"}}, {"title": "在 Claude Code 中选择 Claude 模型与努力级别", "summary": "Claude Code 提供模型（model）和努力级别（effort）两种设置。模型选择决定能力范围，更大模型（如 Claude Fable 5）在基准上优于 Claude Sonnet。努力级别不单是思考时间，还控制读取文件数、验证步骤及多步任务的推进深度。较高努力下 Claude 会自行读取文件、运行测试并复核；较低努力则更倾向请求用户提供上下文。若 Claude 已掌握上下文但仍出错，应换更强大模型；若因跳读文件或未运行测试而出错，则应提高努力级别。", "sourceUrl": "https://claude.com/blog/claude-model-and-effort-level-in-claude-code", "sourceName": "Claude：Blog（网页）", "permalink": "https://aihot.virxact.com/items/cmraqmpst004cihogf6nqkgvh", "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/items/cmraqmpst004cihogf6nqkgvh"}}]}], "attribution": {"source": "AI HOT", "canonical": "https://aihot.virxact.com/daily/2026-07-08"}, "generatedAt": "2026-07-08T00:00:00.267Z", "windowStart": "2026-07-07T00:00:00.000Z", "windowEnd": "2026-07-08T00:00:00.000Z"}</script><script>
class ThemeManager{
  constructor(){this.current=this.stored()||this.system();this.apply(this.current);this.init();}
  system(){return matchMedia("(prefers-color-scheme:dark)").matches?"dark":"light";}
  stored(){return localStorage.getItem("theme");}
  apply(t){if(t==="system"){document.documentElement.removeAttribute("data-theme");localStorage.removeItem("theme");}else{document.documentElement.setAttribute("data-theme",t);localStorage.setItem("theme",t);}this.current=t;this.ui();}
  init(){var t=document.querySelector(".theme-toggle");if(t)t.addEventListener("click",function(e){var b=e.target.closest("button[data-theme]");if(b)this.apply(b.dataset.theme);}.bind(this));}
  ui(){document.querySelectorAll(".theme-toggle button").forEach(function(b){var on=b.dataset.theme===this.current;b.classList.toggle("active",on);b.setAttribute("aria-checked",on);}.bind(this));}
}

  var g=pUTC(P.generatedAt),ws=pUTC(P.windowStart),we=pUTC(P.windowEnd),sub=[];

  if(ws&&we)sub.push("数据窗口："+bj(ws,{month:"long",day:"numeric"})+" – "+bj(we,{month:"long",day:"numeric"}));
  document.getElementById("subtitle").textContent=sub.join(" · ");
  document.getElementById("totalnum").textContent=P.total;
  var stats=document.getElementById("stats");
  P.sections.forEach(function(s,i){var d=document.createElement("div");d.className="stat c"+i;d.innerHTML='<div class="n">'+s.items.length+'</div><div class="l">'+esc(s.label)+'</div>';stats.appendChild(d);});
  var toc=document.getElementById("toc");
  P.sections.forEach(function(s,i){var a=document.createElement("a");a.href="#sec"+i;a.textContent=s.label;toc.appendChild(a);});
  var main=document.getElementById("main"),n=0;
  P.sections.forEach(function(s,i){
    var sec=document.createElement("section");sec.className="block";sec.id="sec"+i;
    var h=document.createElement("h2");h.innerHTML=esc(s.label)+' <span class="pill">'+s.items.length+'</span>';sec.appendChild(h);
    var grid=document.createElement("div");grid.className="grid";
    s.items.forEach(function(it){n++;var url=it.sourceUrl||it.permalink||"#";
      var art=document.createElement("article");art.className="card";
      art.innerHTML='<span class="num">'+n+'</span><h3>'+esc(it.title)+'</h3>'+(it.sourceName?'<span class="chip">'+esc(it.sourceName)+'</span>':'')+'<p>'+esc(it.summary||"")+'</p><a class="more" href="'+esc(url)+'" target="_blank" rel="noopener noreferrer">阅读原文 →</a>';
      grid.appendChild(art);});
    sec.appendChild(grid);main.appendChild(sec);
  });
  document.getElementById("footertotal").textContent=P.total;
  new ThemeManager();
  var anchors=[].slice.call(toc.querySelectorAll("a"));
  if("IntersectionObserver" in window){
    var obs=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting)anchors.forEach(function(a){a.classList.toggle("active",a.getAttribute("href")==="#"+e.target.id);});});},{rootMargin:"-30% 0px -60% 0px"});
    P.sections.forEach(function(s,i){var el=document.getElementById("sec"+i);if(el)obs.observe(el);});
  }
})();</script></body></html>
