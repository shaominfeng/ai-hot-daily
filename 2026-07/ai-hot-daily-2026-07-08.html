<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI HOT · AI 日报晨报仪表盘</title>
<style>
  :root{
    --bg:#f6f7fb; --panel:#ffffff; --ink:#1f2430; --muted:#6b7280;
    --line:#e7e9f0; --brand:#4f46e5; --soft:#eef1ff;
    --shadow:0 1px 2px rgba(16,24,40,.06),0 8px 24px rgba(16,24,40,.06);
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;}

  /* ===== Hero ===== */
  .hero{
    background:linear-gradient(135deg,#eef1ff 0%,#f6f7fb 55%,#eafff4 100%);
    border-bottom:1px solid var(--line);
    padding:40px 20px 30px;
  }
  .hero-inner{max-width:1120px;margin:0 auto;}
  .kicker{
    display:inline-flex;align-items:center;gap:8px;
    font-size:13px;font-weight:600;color:var(--brand);
    background:var(--soft);border:1px solid #dfe3ff;
    padding:5px 12px;border-radius:999px;letter-spacing:.3px;
  }
  .kicker .dot{width:7px;height:7px;border-radius:50%;background:var(--brand);}
  h1.title{font-size:clamp(28px,5vw,44px);margin:14px 0 6px;letter-spacing:-.5px;}
  .subtitle{color:var(--muted);font-size:15px;margin:0 0 22px;}
  .subtitle b{color:var(--ink);font-weight:600;}

  .stats{display:flex;flex-wrap:wrap;gap:14px;}
  .stat-card{
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:16px 18px;box-shadow:var(--shadow);min-width:120px;
  }
  .stat-card.total{flex:1 1 200px;display:flex;flex-direction:column;justify-content:center;}
  .stat-card.total .big{font-size:38px;font-weight:800;line-height:1;color:var(--brand);}
  .stat-card.total .lbl{font-size:13px;color:var(--muted);margin-top:6px;}
  .stat-mini{flex:1 1 150px;}
  .stat-mini .top{display:flex;align-items:center;gap:8px;}
  .stat-mini .swatch{width:10px;height:10px;border-radius:3px;}
  .stat-mini .name{font-size:13px;color:var(--muted);font-weight:600;}
  .stat-mini .num{font-size:26px;font-weight:800;margin-top:4px;}

  /* ===== Nav ===== */
  nav.toc{
    position:sticky;top:0;z-index:50;
    background:rgba(255,255,255,.86);backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .toc-inner{max-width:1120px;margin:0 auto;padding:10px 20px;
    display:flex;gap:8px;overflow-x:auto;}
  .toc a{
    text-decoration:none;white-space:nowrap;font-size:13px;font-weight:600;
    color:var(--ink);background:var(--panel);border:1px solid var(--line);
    padding:7px 13px;border-radius:999px;display:inline-flex;align-items:center;gap:7px;
    transition:.15s;
  }
  .toc a:hover{border-color:var(--brand);color:var(--brand);}
  .toc a .cnt{font-size:11px;color:#fff;background:var(--brand);
    border-radius:999px;padding:1px 7px;font-weight:700;}
  .toc a .sw{width:8px;height:8px;border-radius:50%;}

  /* ===== Main ===== */
  main{max-width:1120px;margin:0 auto;padding:30px 20px 10px;}
  .section{margin-bottom:40px;scroll-margin-top:64px;}
  .sec-head{display:flex;align-items:center;gap:12px;margin:0 0 18px;}
  .sec-bar{width:5px;height:26px;border-radius:3px;}
  .sec-head h2{font-size:21px;margin:0;}
  .sec-head .cnt{font-size:13px;color:var(--muted);font-weight:600;
    background:var(--panel);border:1px solid var(--line);padding:3px 10px;border-radius:999px;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;}
  .card{
    background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:18px 18px 16px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;gap:10px;position:relative;
    transition:transform .15s,box-shadow .15s,border-color .15s;
  }
  .card:hover{transform:translateY(-3px);border-color:#cfd3e6;
    box-shadow:0 4px 10px rgba(16,24,40,.08),0 16px 40px rgba(16,24,40,.10);}
  .card .num{
    position:absolute;top:-11px;left:14px;width:26px;height:26px;border-radius:8px;
    background:var(--brand);color:#fff;font-size:13px;font-weight:800;
    display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(79,70,229,.35);
  }
  .card .c-title{font-size:16px;font-weight:700;margin:6px 0 0;line-height:1.45;}
  .chip{
    align-self:flex-start;font-size:12px;font-weight:600;color:var(--muted);
    background:#f3f4f8;border:1px solid var(--line);padding:3px 10px;border-radius:999px;
    max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .card .summary{font-size:14px;color:#374151;margin:2px 0 0;}
  .card .more{
    margin-top:auto;font-size:13px;font-weight:700;color:var(--brand);
    text-decoration:none;display:inline-flex;align-items:center;gap:5px;align-self:flex-start;
  }
  .card .more:hover{text-decoration:underline;}

  /* ===== Footer ===== */
  footer{border-top:1px solid var(--line);background:var(--panel);margin-top:20px;}
  .foot-inner{max-width:1120px;margin:0 auto;padding:24px 20px 40px;color:var(--muted);font-size:13px;}
  .foot-inner b{color:var(--ink);}
  .foot-inner a{color:var(--brand);text-decoration:none;}
  .foot-inner a:hover{text-decoration:underline;}
  .foot-note{margin-top:8px;font-size:12px;opacity:.85;}
</style>
</head>

<main id="main"></main>

<script>
(function(){
  var payload = document.getElementById('payload').textContent;
  var DATA = JSON.parse(payload);

  // ---- Beijing-time human formatting (no ISO strings shown) ----
  var WEEK = ['周日','周一','周二','周三','周四','周五','周六'];
  function beijing(d){
    // d: Date object; interpret as UTC then shift to Asia/Shanghai
    return new Intl.DateTimeFormat('zh-CN',{
      timeZone:'Asia/Shanghai', year:'numeric', month:'long', day:'numeric', weekday:'short'
    }).format(d);
  }
  function beijingTime(d){
    return new Intl.DateTimeFormat('zh-CN',{
      timeZone:'Asia/Shanghai', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit', hour12:false
    }).format(d);
  }
  function pad(n){return n<10?'0'+n:n;}
  function parseUTC(iso){
    if(!iso) return null;
    try{ return new Date(iso); }catch(e){ return null; }
  }

  // ---- Hero ----
  var dateStr = DATA.date || '';
  var gen = parseUTC(DATA.generatedAt);
  var ws = parseUTC(DATA.windowStart), we = parseUTC(DATA.windowEnd);
  var dateCN = dateStr;
  if(dateStr){
    var dt = parseUTC(dateStr+'T00:00:00Z');
    if(dt) dateCN = beijing(dt).replace('星期','周');
  }
  document.getElementById('title').textContent = 'AI 日报 · ' + (dateStr||'');
  var subParts = [];
  if(gen) subParts.push('生成于 ' + beijingTime(gen) + '（北京时间）');
  if(ws && we) subParts.push('数据窗口：' + beijingTime(ws) + ' – ' + beijingTime(we));
  document.getElementById('subtitle').innerHTML =
    '<b>'+dateCN+'</b> · ' + subParts.join(' · ');

  // Stats
  var statsEl = document.getElementById('stats');
  var totalCard = document.createElement('div');
  totalCard.className = 'stat-card total';
  totalCard.innerHTML = '<div class="big">'+DATA.total+'</div><div class="lbl">今日精选条目总数</div>';
  statsEl.appendChild(totalCard);
  DATA.sections.forEach(function(s){
    var c = document.createElement('div');
    c.className = 'stat-card stat-mini';
    c.innerHTML = '<div class="top"><span class="swatch" style="background:'+s.color+'"></span>'
      + '<span class="name">'+esc(s.label)+'</span></div>'
      + '<div class="num" style="color:'+s.color+'">'+s.items.length+'</div>';
    statsEl.appendChild(c);
  });

  // ---- TOC ----
  var toc = document.getElementById('toc');
  DATA.sections.forEach(function(s, i){
    var a = document.createElement('a');
    a.href = '#sec-'+i;
    a.innerHTML = '<span class="sw" style="background:'+s.color+'"></span>'
      + esc(s.label) + ' <span class="cnt">'+s.items.length+'</span>';
    toc.appendChild(a);
  });

  // ---- Sections + cards ----
  var main = document.getElementById('main');
  DATA.sections.forEach(function(s, i){
    var sec = document.createElement('section');
    sec.className = 'section'; sec.id = 'sec-'+i;
    var head = document.createElement('div');
    head.className = 'sec-head';
    head.innerHTML = '<span class="sec-bar" style="background:'+s.color+'"></span>'
      + '<h2>'+esc(s.label)+'</h2>'
      + '<span class="cnt">'+s.items.length+' 条</span>';
    sec.appendChild(head);

    var grid = document.createElement('div');
    grid.className = 'grid';
    s.items.forEach(function(it){
      var card = document.createElement('article');
      card.className = 'card';
      var url = it.url || '#';
      var safeRel = 'noopener noreferrer';
      card.innerHTML =
        '<span class="num">'+it.n+'</span>'
        + '<h3 class="c-title"><a href="'+esc(url)+'" target="_blank" rel="'+safeRel+'" style="text-decoration:none;color:inherit;">'+esc(it.title)+'</a></h3>'
        + '<span class="chip" title="'+esc(it.source)+'">'+esc(it.source)+'</span>'
        + '<p class="summary">'+esc(it.summary)+'</p>'
        + '<a class="more" href="'+esc(url)+'" target="_blank" rel="'+safeRel+'">阅读原文 →</a>';
      grid.appendChild(card);
    });
    sec.appendChild(grid);
    main.appendChild(sec);
  });

  // ---- Footer ----
  var foot = document.getElementById('footer');
  foot.innerHTML =
    '<div>本日报共收录 <b>'+DATA.total+'</b> 条 AI 资讯，按五大版块分组、全局连续编号。</div>'
    + '<div class="foot-note">数据源：<a href="'+esc(DATA.canonical)+'" target="_blank" rel="noopener noreferrer">'+esc(DATA.source)+'</a> · '
    + '基准日期 <b>'+(dateStr||'')+'</b> · 时间均以北京时间（UTC+8）呈现。</div>';

  function esc(s){
    return String(s==null?'':s).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
})();
</script>
